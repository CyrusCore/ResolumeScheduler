name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build hanya saat push Tag versi (misal: git tag v1.5.2)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Base Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Build Tools
        run: |
          pip install pyinstaller pywebview pillow

      - name: Inject Version Tag
        run: |
          $tag = "${{ github.ref_name }}" -replace "^v", ""
          $tag = $tag.Trim()
          (Get-Content app.py -Raw) -replace 'APP_VERSION = "[^"]*"', ('APP_VERSION = "' + $tag + '"') | Set-Content app.py -NoNewline

      - name: Compile Executable (PyInstaller)
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon "logo.ico" --add-data "templates;templates" --add-data "static;static" app.py --name "ResolumeScheduler"

      - name: Zip The Output
        run: |
          Compress-Archive -Path dist\ResolumeScheduler -DestinationPath ResolumeScheduler-Windows.zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: ResolumeScheduler-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
